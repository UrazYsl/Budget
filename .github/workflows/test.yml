name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: budget_user
          POSTGRES_PASSWORD: budget_pass
          POSTGRES_DB: budget_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U budget_user -d budget_db"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20

    env:
      TEST_DATABASE_URL: postgresql+psycopg://budget_user:budget_pass@localhost:5432/budget_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest python-dotenv

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v
