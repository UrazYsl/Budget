server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
