<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgeting App</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()">

    <nav id="sidebar">
        <div id="logo">Budget</div>
        <ul>
            <li @click="page = 'dashboard'" :class="{ active: page === 'dashboard' }">Dashboard</li>
            <li @click="page = 'transactions'" :class="{ active: page === 'transactions' }">Transactions</li>
            <li @click="page = 'accounts'" :class="{ active: page === 'accounts' }">Accounts</li>
            <li @click="page = 'categories'" :class="{ active: page === 'categories' }">Categories</li>
            <li @click="page = 'recurring'" :class="{ active: page === 'recurring' }">Recurring</li>
            <li @click="page = 'settings'" :class="{ active: page === 'settings' }">Settings</li>
        </ul>
    </nav>

    <main id="content">

        <div x-show="page === 'dashboard'">
            <h2>Dashboard</h2>
        </div>

        <div x-show="page === 'transactions'">
            <h2>Transactions</h2>
        </div>

        <div x-show="page === 'accounts'">
            <h2>Accounts</h2>
        </div>

        <div x-show="page === 'categories'">
            <h2>Categories</h2>
        </div>

        <div x-show="page === 'recurring'">
            <h2>Recurring Transactions</h2>
        </div>

        <div x-show="page === 'settings'">
            <h2>Settings</h2>
        </div>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
